<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Compte — ' + ${account.accountHolder}">Compte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #e6f4f8; }
        header { background-color: #000; color: #fff; padding: 1rem 2rem; }
    </style>
</head>
<body>
<header>
    <h3 class="mb-0">🏠 Gestion des Comptes Bancaires</h3>
</header>

<div class="container py-4" style="max-width: 700px;">
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Détails du Compte</h5>
            <span class="badge bg-light text-dark" th:text="'ID: ' + ${account.id}"></span>
        </div>
        <div class="card-body">
            <table class="table table-borderless mb-0">
                <tr>
                    <th style="width:40%">Titulaire</th>
                    <td th:text="${account.accountHolder}"></td>
                </tr>
                <tr>
                    <th>Numéro de compte</th>
                    <td th:text="${account.accountNumber}"></td>
                </tr>
                <tr>
                    <th>Solde</th>
                    <td>
                        <strong class="fs-5" th:text="${#numbers.formatDecimal(account.balance, 1, 2)} + ' €'"></strong>
                    </td>
                </tr>
                <tr>
                    <th>Créé le</th>
                    <td th:text="${#temporals.format(account.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                </tr>
            </table>
        </div>
    </div>

    <!-- Deposit / Withdraw forms -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="card shadow-sm border-success">
                <div class="card-header bg-success text-white">Effectuer un Dépôt</div>
                <div class="card-body">
                    <form th:action="@{/accounts/deposit}" method="post">
                        <input type="hidden" name="id" th:value="${account.id}">
                        <div class="mb-2">
                            <label class="form-label">Montant (€)</label>
                            <input type="number" name="amount" class="form-control" placeholder="0.00"
                                   min="0.01" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Déposer</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm border-danger">
                <div class="card-header bg-danger text-white">Effectuer un Retrait</div>
                <div class="card-body">
                    <form th:action="@{/accounts/withdraw}" method="post">
                        <input type="hidden" name="id" th:value="${account.id}">
                        <div class="mb-2">
                            <label class="form-label">Montant (€)</label>
                            <input type="number" name="amount" class="form-control" placeholder="0.00"
                                   min="0.01" step="0.01" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100">Retirer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2">
        <a href="/accounts" class="btn btn-secondary">← Retour à la liste</a>
        <a th:href="@{/accounts/edit/{id}(id=${account.id})}" class="btn btn-warning">Modifier</a>
        <a th:href="@{/accounts/delete/{id}(id=${account.id})}"
           class="btn btn-danger"
           onclick="return confirm('Supprimer ce compte ?')">Supprimer</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
