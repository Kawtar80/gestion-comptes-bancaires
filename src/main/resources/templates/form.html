<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isNew} ? 'Nouveau Compte' : 'Modifier le Compte'">Compte</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #e6f4f8; }
        header { background-color: #000; color: #fff; padding: 1rem 2rem; }
    </style>
</head>
<body>
<header>
    <h3 class="mb-0">🏠 Gestion des Comptes Bancaires</h3>
</header>

<div class="container py-4" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0" th:text="${isNew} ? 'Créer un nouveau compte' : 'Modifier le compte'">Compte</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/accounts/save}" th:object="${account}" method="post">
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Titulaire</label>
                    <input type="text" th:field="*{accountHolder}" class="form-control"
                           placeholder="Ex: Jean Dupont" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Numéro de Compte (IBAN)</label>
                    <input type="text" th:field="*{accountNumber}" class="form-control"
                           placeholder="Ex: FR76 1234 5678 9012 3456 7890 123" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Solde initial (€)</label>
                    <input type="number" th:field="*{balance}" class="form-control"
                           placeholder="0.00" step="0.01" min="0" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <span th:text="${isNew} ? 'Créer le compte' : 'Enregistrer les modifications'">Sauvegarder</span>
                    </button>
                    <a href="/accounts" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
